<div class="bg-white rounded-2xl border border-gray-100 p-5 hover:shadow-xl hover:-translate-y-1 transition-all duration-200 flex flex-col justify-between h-full">

  <!-- HEADER -->
  <div class="flex justify-between items-start mb-3">
    <div>
      <h3 class="text-base font-semibold text-gray-800 leading-tight">
        {{ fund().name }}
      </h3>
      <p class="text-xs text-gray-500 mt-1">
        Fondo de inversión
      </p>
    </div>

    <!-- BADGE -->
    <span
      class="text-xs font-medium px-2 py-1 rounded-full"
      [ngClass]="{
        'bg-blue-100 text-blue-600': fund().category === 'FPV',
        'bg-purple-100 text-purple-600': fund().category === 'FIC'
      }">
      {{ fund().category }}
    </span>
  </div>

  <!-- INFO -->
  <div class="mb-4">
    <p class="text-xs text-gray-500">
      Monto mínimo
    </p>

    <p class="text-lg font-semibold text-gray-900">
      {{ fund().minAmount | currency : 'USD' : 'symbol' : '1.0-0' }}
    </p>
  </div>

  <!-- ACTION -->
  @if (mode() === 'available') {
    <button
      class="w-full cursor-pointer bg-linear-to-r from-blue-600 to-indigo-600  text-white py-2.5 rounded-xl text-sm font-medium hover:opacity-90 transition active:scale-[0.98]"
      (click)="onSubscribe()">
      Suscribirse
    </button>

  } @else {

    <button
      class="w-full cursor-pointer bg-red-500 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-red-600 transition active:scale-[0.98]"
      (click)="onUnsubscribe()">
      Cancelar suscripción
    </button>
  }
</div>
