<header class="fixed top-0 left-0 right-0 z-60 flex items-center justify-between h-16! w-full p-4 shadow shadow-primary-800 bg-primary-600">
    <div class="flex items-center gap-2 sm:gap-4">
        <button (click)="toggleSidebar()" class="cursor-pointer hover:bg-primary-300/40 transition ease-in p-2 rounded-full">
            <img src="icons/menu.svg" alt="icon-menu">
        </button>
        <span class="text-lg font-bold text-gray-100">Fondos</span>
    </div>

    <div class="text-gray-900 bg-white px-4 py-2 text-sm font-semibold rounded-full">{{ balance() | currency : 'USD' : 'symbol' : '1.0-0' }}</div>
</header>
